<!DOCTYPE html>
<html lang="en" data-property="opptycon" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
    <title>OpptyCon | NetherOps</title>
    <meta name="description" content="OpptyCon — Revenue simulation and governance control surface by NetherOps" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- House canon: Fraunces (display) + JetBrains Mono (mono). Chivo Mono retired. -->
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,100..900,0..100,0..1&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles/tokens.css" />
    <style>
      /* TWK Everett — body face. Bauhaus @font-face retired per HERETICS-BRAND.md
         2026-05-28; Bauhaus lives only inside SVG lockups now. */
      @font-face { font-family: 'TWK Everett'; src: url('/fonts/TWKEverett-Light.otf') format('opentype'); font-weight: 300; font-display: swap; }
      @font-face { font-family: 'TWK Everett'; src: url('/fonts/TWKEverett-Regular.otf') format('opentype'); font-weight: 400; font-display: swap; }
      @font-face { font-family: 'TWK Everett'; src: url('/fonts/TWKEverett-Bold.otf') format('opentype'); font-weight: 700; font-display: swap; }
    </style>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%2322d3ee'/><text x='16' y='22' text-anchor='middle' font-size='18' fill='%23000'>⚡</text></svg>" />
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; overflow: hidden; }
      input[type="range"] { height: 6px; }
      @media (max-width: 768px) {
        /* Collapse multi-column grids */
        div[style*="grid-template-columns: 1fr 1fr"] { grid-template-columns: 1fr !important; }
        div[style*="grid-template-columns: repeat(5"] { grid-template-columns: repeat(2, 1fr) !important; }
        div[style*="grid-template-columns: repeat(3"] { grid-template-columns: 1fr !important; }
        div[style*="grid-template-columns: repeat(6"] { grid-template-columns: repeat(3, 1fr) !important; }
        /* Collapse sidebar+content layouts */
        div[style*="grid-template-columns: 380px"] { grid-template-columns: 1fr !important; }
        div[style*="grid-template-columns: 220px"] { grid-template-columns: 1fr !important; }
        div[style*="grid-template-columns: 200px"] { grid-template-columns: 1fr !important; }
        div[style*="grid-template-columns: 180px"] { grid-template-columns: 1fr !important; }
        /* Touch targets */
        input[type="range"] { height: 28px; -webkit-appearance: none; }
        button { min-height: 36px; }
        /* Prevent horizontal overflow */
        main { max-width: 100vw; }
        /* Readable text */
        body { -webkit-text-size-adjust: 100%; }
      }
    </style>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-3Y14KHPXRM"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-3Y14KHPXRM');
    </script>

    <!-- Heretics House bridge — must be declared BEFORE the shared bundle loads
         so the bundle's ?h= ingest can route through OpptyCon's own theme key.
         App.jsx reads localStorage('opptycon-theme') on mount, so the ingest
         flow ?h=light|dark → localStorage write → App reads on mount works
         end-to-end for cross-property entry. -->
    <script>
      window.HERETICS_LOCAL_THEME_KEY = 'opptycon-theme';
      /* Apply callback is a no-op here because App.jsx owns the React state
         that drives theme. App.jsx reads localStorage on mount (line 4962) so
         the ingest-then-mount sequence picks up the incoming theme naturally. */
      window.HERETICS_APPLY_THEME = function () {};
    </script>
    <script src="https://marketsinsecurity.com/assets/heretics-house.js" defer></script>
  </head>
  <body>
    <form name="alpha-access" netlify netlify-honeypot="bot-field" hidden>
      <input name="email" /><input name="role" /><input name="company" /><input name="bot-field" />
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
